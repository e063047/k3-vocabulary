<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K3 Vocabulary Practice + Sound</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #1a1a2e;
    color: #eee;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* ── Settings Screen ──────────────────────────────────── */
  #settings-screen {
    background: #16213e;
    border-radius: 16px;
    padding: 40px 48px;
    width: 420px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  #settings-screen h1 {
    text-align: center;
    font-size: 1.6rem;
    margin-bottom: 32px;
    color: #e94560;
    letter-spacing: 1px;
  }

  .setting-group { margin-bottom: 24px; }

  .setting-group > label {
    display: block;
    font-weight: 600;
    margin-bottom: 10px;
    color: #a8b2d8;
    font-size: 0.9rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .mode-btn-row { display: flex; gap: 10px; }

  .mode-btn {
    flex: 1;
    padding: 12px;
    border: 2px solid #0f3460;
    border-radius: 8px;
    background: #0f3460;
    color: #ccc;
    cursor: pointer;
    font-size: 0.95rem;
    transition: all 0.2s;
  }

  .mode-btn.active {
    border-color: #e94560;
    background: #e94560;
    color: #fff;
    font-weight: 700;
  }

  .order-option {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    border: 2px solid #0f3460;
    border-radius: 8px;
    cursor: pointer;
    margin-bottom: 8px;
    transition: border-color 0.2s;
    background: #0f3460;
  }

  .order-option:hover { border-color: #e94560; }
  .order-option.active { border-color: #e94560; background: #1a1a3e; }
  .order-option input[type="radio"] { accent-color: #e94560; }
  .order-option label { cursor: pointer; flex: 1; }

  #start-pos-group {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 6px;
    padding-left: 14px;
  }

  #start-pos-group label { font-size: 0.85rem; color: #a8b2d8; }

  #start-pos {
    width: 70px;
    padding: 6px 10px;
    border-radius: 6px;
    border: 1px solid #0f3460;
    background: #0d1b3e;
    color: #eee;
    font-size: 1rem;
    text-align: center;
  }

  #start-btn {
    width: 100%;
    padding: 14px;
    margin-top: 10px;
    background: #e94560;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 1.1rem;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 1px;
    transition: background 0.2s, transform 0.1s;
  }

  #start-btn:hover { background: #c73652; transform: translateY(-1px); }
  #start-btn:active { transform: translateY(0); }

  /* ── Practice Screen ──────────────────────────────────── */
  #practice-screen {
    display: none;
    flex-direction: column;
    width: 100vw;
    height: 100vh;
  }

  #card-area {
    flex: 1;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    background: #111;
  }

  #card-img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    display: block;
    user-select: none;
  }

  #answer-cover {
    position: absolute;
    top: 0;
    right: 0;
    width: 50%;
    height: 100%;
    background: #1a1a2e;
    display: flex;
    align-items: center;
    justify-content: center;
    border-left: 3px dashed #333;
    transition: opacity 0.3s;
  }

  #answer-cover span {
    font-size: 0.9rem;
    color: #444;
    letter-spacing: 2px;
  }

  /* ── Bottom Bar ───────────────────────────────────────── */
  #bottom-bar {
    height: 22vh;
    min-height: 130px;
    background: #16213e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-evenly;
    padding: 8px 20px;
    border-top: 2px solid #0f3460;
  }

  #bottom-bar-info {
    display: flex;
    width: 100%;
    justify-content: space-between;
    align-items: center;
  }

  #mode-label {
    font-size: 0.85rem;
    font-weight: 700;
    padding: 6px 12px;
    border-radius: 20px;
    background: #0f3460;
    color: #a8b2d8;
    white-space: nowrap;
    text-align: center;
  }

  #mode-label.test     { background: #e94560; color: #fff; }
  #mode-label.practise { background: #0f7c4c; color: #fff; }

  #controls { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }

  .ctrl-btn {
    padding: 21px 42px;
    border: none;
    border-radius: 14px;
    font-size: 1.6rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.3px;
    white-space: nowrap;
  }

  #show-answer-btn { background: #e94560; color: #fff; }
  #show-answer-btn:hover { background: #c73652; }

  #play-sound-btn {
    background: #5b4fcf;
    color: #fff;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  #play-sound-btn:hover { background: #4a3db8; }
  #play-sound-btn.playing { background: #3a2da8; animation: pulse 0.6s infinite alternate; }

  @keyframes pulse { from { opacity: 1; } to { opacity: 0.6; } }

  #next-btn { background: #0f3460; color: #eee; border: 1px solid #2a4a80; }
  #next-btn:hover { background: #1a4a8a; }

  #record-btn { background: #c47a00; color: #fff; }
  #record-btn.recorded { background: #8a4800; }
  #record-btn:hover { opacity: 0.85; }

  #view-records-btn { background: #2a2a5a; color: #a8b2d8; font-size: 0.8rem; padding: 8px 12px; }
  #view-records-btn:hover { background: #3a3a7a; }

  #prev-btn { background: #0f3460; color: #eee; border: 1px solid #2a4a80; }
  #prev-btn:hover { background: #1a4a8a; }
  #prev-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  #status-label {
    font-size: 0.85rem;
    color: #a8b2d8;
    white-space: nowrap;
    text-align: right;
  }

  /* ── Review Screen ────────────────────────────────────── */
  #review-screen {
    display: none;
    flex-direction: column;
    width: 100vw;
    height: 100vh;
    background: #1a1a2e;
  }

  #review-header {
    background: #16213e;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 2px solid #0f3460;
  }

  #review-header h2 { font-size: 1.2rem; color: #e94560; }

  .review-action-btns { display: flex; gap: 10px; }

  .review-action-btns button {
    padding: 8px 18px;
    border: none;
    border-radius: 7px;
    cursor: pointer;
    font-size: 0.9rem;
    font-weight: 600;
  }

  #review-clear-btn { background: #c73652; color: #fff; }
  #review-close-btn { background: #0f3460; color: #eee; }

  #review-list {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-content: flex-start;
  }

  .review-card {
    background: #16213e;
    border: 2px solid #c47a00;
    border-radius: 10px;
    padding: 10px 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    cursor: pointer;
    transition: border-color 0.2s;
    min-width: 90px;
  }

  .review-card:hover { border-color: #e94560; }
  .review-card .card-num   { font-size: 0.75rem; color: #888; }
  .review-card .card-word  { font-size: 1rem; font-weight: 700; color: #eee; }
  .review-card .card-count { font-size: 0.8rem; color: #c47a00; }

  #review-empty {
    color: #555;
    font-size: 1.1rem;
    text-align: center;
    margin-top: 60px;
    width: 100%;
  }

  /* ── Toast ────────────────────────────────────────────── */
  #toast {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #e94560;
    color: #fff;
    padding: 10px 24px;
    border-radius: 24px;
    font-size: 0.95rem;
    font-weight: 600;
    opacity: 0;
    transition: opacity 0.3s, transform 0.3s;
    pointer-events: none;
    z-index: 999;
  }

  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── Speech Settings Sliders ─────────────────────────── */
  .slider-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .slider-label { font-size: 0.85rem; color: #a8b2d8; width: 36px; flex-shrink: 0; }
  .slider-row input[type="range"] { flex: 1; accent-color: #e94560; cursor: pointer; }
  .slider-val {
    font-size: 0.85rem;
    color: #eee;
    width: 36px;
    text-align: right;
    flex-shrink: 0;
    font-variant-numeric: tabular-nums;
  }

  /* Tablet ≤ 900px */
  @media (max-width: 900px) {
    #bottom-bar { height: auto; min-height: 110px; padding: 10px 14px; gap: 8px; }
    .ctrl-btn { padding: 12px 22px; font-size: 1.05rem; border-radius: 10px; }
  }

  /* Mobile ≤ 480px */
  @media (max-width: 480px) {
    #settings-screen { width: 95vw; padding: 20px 14px; }
    #bottom-bar { min-height: 80px; padding: 8px 10px; gap: 4px; }
    #controls { gap: 5px; }
    .ctrl-btn { padding: 8px 13px; font-size: 0.82rem; border-radius: 8px; }
  }
</style>
</head>
<body>

<!-- ════════════ SETTINGS SCREEN ════════════ -->
<div id="settings-screen">
  <h1>K3 Vocabulary Practice</h1>

  <div class="setting-group">
    <label>Mode</label>
    <div class="mode-btn-row">
      <button class="mode-btn active" data-mode="test"     onclick="selectMode('test')">Test Mode</button>
      <button class="mode-btn"        data-mode="practise" onclick="selectMode('practise')">Practise Mode</button>
    </div>
  </div>

  <div class="setting-group">
    <label>Playback Order</label>
    <div class="order-option active" id="opt-start" onclick="selectOrder('start')">
      <input type="radio" name="order" value="start" id="radio-start" checked>
      <label for="radio-start">Specify start position</label>
    </div>
    <div id="start-pos-group">
      <label>Card number (001 – <span id="card-range-end">177</span>):</label>
      <input type="number" id="start-pos" min="1" max="177" value="1">
    </div>
    <div class="order-option" id="opt-random" onclick="selectOrder('random')">
      <input type="radio" name="order" value="random" id="radio-random">
      <label for="radio-random">Randomly allocated</label>
    </div>
  </div>

  <div class="setting-group">
    <label>發音設定</label>
    <div class="slider-row">
      <span class="slider-label">語速</span>
      <input type="range" id="rate-slider" min="0.5" max="1.0" step="0.05" value="0.70"
             oninput="onRateChange(this.value)">
      <span class="slider-val" id="rate-val">0.70</span>
    </div>
    <div class="slider-row">
      <span class="slider-label">音調</span>
      <input type="range" id="pitch-slider" min="0.8" max="1.5" step="0.1" value="1.1"
             oninput="onPitchChange(this.value)">
      <span class="slider-val" id="pitch-val">1.1</span>
    </div>
  </div>

  <button id="start-btn" onclick="startPractice()">Start</button>
</div>

<!-- ════════════ PRACTICE SCREEN ════════════ -->
<div id="practice-screen">
  <div id="card-area">
    <img id="card-img" src="" alt="flashcard">
    <div id="answer-cover"><span>? ? ?</span></div>
  </div>

  <div id="bottom-bar">
    <div id="bottom-bar-info">
      <span id="mode-label">Test Mode</span>
      <span id="status-label">Status: 0 / 177</span>
    </div>
    <div id="controls">
      <button class="ctrl-btn" id="show-answer-btn"  onclick="showAnswer()">Show Answer</button>
      <button class="ctrl-btn" id="play-sound-btn"   onclick="playSound()">&#128266; Play [P]</button>
      <button class="ctrl-btn" id="prev-btn"         onclick="prevCard()">&#9664; Prev</button>
      <button class="ctrl-btn" id="next-btn"         onclick="nextCard()">Next &#9654;</button>
      <button class="ctrl-btn" id="record-btn"       onclick="toggleRecord()">Record [R]</button>
      <button class="ctrl-btn" id="view-records-btn" onclick="openReview()">View Records</button>
    </div>
  </div>
</div>

<!-- ════════════ REVIEW SCREEN ════════════ -->
<div id="review-screen">
  <div id="review-header">
    <h2>Recorded Words</h2>
    <div class="review-action-btns">
      <button id="review-clear-btn" onclick="clearRecords()">Clear All</button>
      <button id="review-close-btn" onclick="closeReview()">Back</button>
    </div>
  </div>
  <div id="review-list"></div>
</div>

<div id="toast"></div>

<script>
let CARDS = [
  "001-tape","002-game","003-gate","004-kite","005-cape",
  "006-cake","007-wave","008-pine","009-cane","010-name",
  "011-skate","012-ripe","013-mane","014-lake","015-cave",
  "016-fine","017-lime","018-five","019-home","020-cube",
  "021-bike","022-nine","023-bone","024-mute","025-time",
  "026-dive","027-cone","028-cute","029-hike","030-line",
  "031-rope","032-mule","033-tube","034-rain","035-bay",
  "036-sail","037-June","038-nail","039-day","040-mail",
  "041-tune","042-tail","043-say","044-hay","045-rule",
  "046-wait","047-pay","048-May","049-cat","050-ram",
  "051-fan","052-dad","053-ant","054-jam","055-man",
  "056-pad","057-yak","058-yam","059-pan","060-bag",
  "061-ax","062-dam","063-can","064-rag","065-cap",
  "066-bat","067-web","068-jet","069-map","070-rat",
  "071-egg","072-net","073-nap","074-hat","075-vet",
  "076-wet","077-tap","078-mat","079-ten","080-pet",
  "081-hen","082-hip","083-lip","084-bib","085-pen",
  "086-ink","087-tip","088-rib","089-red","090-zip",
  "091-sip","092-kid","093-bed","094-in","095-rip",
  "096-lid","097-pin","098-fig","099-pit","100-fox",
  "101-fin","102-wig","103-hit","104-log","105-bin",
  "106-big","107-six","108-ox","109-win","110-dig",
  "111-mix","112-rod","113-pot","114-top","115-sun",
  "116-bug","117-hot","118-mop","119-up","120-rug",
  "121-cot","122-hop","123-jug","124-mug","125-dot",
  "126-pop","127-hug","128-bud","129-mud","130-hut",
  "131-gum","132-fun","133-pup","134-cut","135-hum",
  "136-cup","137-cub","138-bun","139-nut","140-tub",
  "141-run","142-floor","143-window","144-door","145-ceiling",
  "146-light","147-sink","148-meat","149-vegetables","150-fruit",
  "151-pasta","152-rice","153-milk","154-cake","155-present",
  "156-card","157-mask","158-candle","159-game","160-swimming pool",
  "161-zoo","162-library","163-supermarket","164-coffee shop","165-park",
  "166-dancing","167-running","168-jumping rope","169-roller skating","170-riding a bike",
  "171-riding a scooter","172-elephant","173-giraffe","174-crocodile","175-monkey",
  "176-lion","177-parrot"
];

let WORDS = CARDS.map(c => c.slice(4).replace(/\s+/g, " ").trim());
let TOTAL = CARDS.length;

// 線上 (GitHub Pages) 圖片在根目錄，本機圖片在 output_cards/
const IMG_BASE = location.hostname.includes("github.io") ? "" : "output_cards/";

let mode        = "test";
let order       = "start";
let queue       = [];
let queueIdx    = 0;
let answered    = false;
let currentCard = null;
let currentWord = null;
let recorded    = {};

// ── Speech ────────────────────────────────────────────────
let voiceReady = false;
let englishVoice = null;
let speechRate  = 0.70;
let speechPitch = 1.1;

function initVoice() {
  const load = () => {
    const voices = speechSynthesis.getVoices();
    englishVoice =
      voices.find(v => v.lang === "en-US" && /zira|jenny|aria|natasha/i.test(v.name)) ||
      voices.find(v => v.lang === "en-US") ||
      voices.find(v => v.lang.startsWith("en")) ||
      voices[0] || null;
    voiceReady = true;
  };
  if (speechSynthesis.getVoices().length > 0) load();
  else speechSynthesis.addEventListener("voiceschanged", load, { once: true });
}

function playSound() {
  if (!currentWord) return;
  speechSynthesis.cancel();

  const btn  = document.getElementById("play-sound-btn");
  btn.classList.add("playing");
  const word = currentWord + ".";

  function speak(onDone) {
    const u = new SpeechSynthesisUtterance(word);
    u.lang   = "en-US";
    u.rate   = speechRate;
    u.pitch  = speechPitch;
    u.volume = 1;
    if (englishVoice) u.voice = englishVoice;
    u.onerror = () => btn.classList.remove("playing");
    if (onDone) u.onend = onDone;
    speechSynthesis.speak(u);
  }

  speak(() => setTimeout(() => speak(() => btn.classList.remove("playing")), 800));
}

function onRateChange(v) {
  speechRate = parseFloat(v);
  document.getElementById("rate-val").textContent = speechRate.toFixed(2);
  localStorage.setItem("k3_speech_rate", speechRate);
}

function onPitchChange(v) {
  speechPitch = parseFloat(v);
  document.getElementById("pitch-val").textContent = speechPitch.toFixed(1);
  localStorage.setItem("k3_speech_pitch", speechPitch);
}

function loadSpeechSettings() {
  const r = parseFloat(localStorage.getItem("k3_speech_rate"));
  const p = parseFloat(localStorage.getItem("k3_speech_pitch"));
  if (!isNaN(r)) {
    speechRate = r;
    document.getElementById("rate-slider").value = r;
    document.getElementById("rate-val").textContent = r.toFixed(2);
  }
  if (!isNaN(p)) {
    speechPitch = p;
    document.getElementById("pitch-slider").value = p;
    document.getElementById("pitch-val").textContent = p.toFixed(1);
  }
}

// ── Init ──────────────────────────────────────────────────
function init() {
  const saved = localStorage.getItem("k3_records");
  if (saved) { try { recorded = JSON.parse(saved); } catch(e) { recorded = {}; } }
  initVoice();
  loadSpeechSettings();
}

// ── Settings ──────────────────────────────────────────────
function selectMode(m) {
  mode = m;
  document.querySelectorAll(".mode-btn").forEach(b => b.classList.toggle("active", b.dataset.mode === m));
}

function selectOrder(o) {
  order = o;
  document.getElementById("radio-start").checked  = (o === "start");
  document.getElementById("radio-random").checked = (o === "random");
  document.getElementById("opt-start").classList.toggle("active",  o === "start");
  document.getElementById("opt-random").classList.toggle("active", o === "random");
}

// ── Start ─────────────────────────────────────────────────
function startPractice() {
  if (order === "start") {
    const pos = Math.max(1, Math.min(TOTAL, parseInt(document.getElementById("start-pos").value) || 1));
    queue = CARDS.slice(pos - 1);
  } else {
    queue = shuffle([...CARDS]);
  }
  queueIdx = 0;

  document.getElementById("settings-screen").style.display = "none";
  const ps = document.getElementById("practice-screen");
  ps.style.display = "flex";
  ps.style.flexDirection = "column";

  const ml = document.getElementById("mode-label");
  if (mode === "test") { ml.textContent = "Test Mode";     ml.className = "test"; }
  else                 { ml.textContent = "Practise Mode"; ml.className = "practise"; }

  document.getElementById("show-answer-btn").style.display = mode === "test" ? "inline-block" : "none";

  loadCard();
}

// ── Load Card ─────────────────────────────────────────────
function loadCard() {
  speechSynthesis.cancel();
  document.getElementById("play-sound-btn").classList.remove("playing");

  if (queueIdx >= queue.length) { showToast("You've completed all cards!"); return; }

  currentCard = queue[queueIdx];
  currentWord = WORDS[CARDS.indexOf(currentCard)];
  answered = false;

  document.getElementById("card-img").src = IMG_BASE + currentCard + ".jpg";

  const cover = document.getElementById("answer-cover");
  cover.style.display = mode === "test" ? "flex" : "none";

  const recBtn = document.getElementById("record-btn");
  if (recorded[currentCard]) {
    recBtn.classList.add("recorded");
    recBtn.textContent = "Recorded (" + recorded[currentCard] + ")";
  } else {
    recBtn.classList.remove("recorded");
    recBtn.textContent = "Record";
  }

  document.getElementById("status-label").textContent =
    "Status: " + (queueIdx + 1) + " / " + queue.length;

  document.getElementById("prev-btn").disabled = (queueIdx === 0);
}

// ── Controls ──────────────────────────────────────────────
function showAnswer() {
  answered = true;
  document.getElementById("answer-cover").style.display = "none";
}

function prevCard() {
  if (queueIdx > 0) { queueIdx--; loadCard(); }
}

function nextCard() { queueIdx++; loadCard(); }

function toggleRecord() {
  if (!currentCard) return;
  recorded[currentCard] = (recorded[currentCard] || 0) + 1;
  saveRecords();
  const btn = document.getElementById("record-btn");
  btn.classList.add("recorded");
  btn.textContent = "Recorded (" + recorded[currentCard] + ")";
  showToast("Recorded: " + currentWord);
}

function saveRecords() { localStorage.setItem("k3_records", JSON.stringify(recorded)); }

// ── Review ────────────────────────────────────────────────
function openReview() {
  document.getElementById("practice-screen").style.display = "none";
  const rs = document.getElementById("review-screen");
  rs.style.display = "flex";
  rs.style.flexDirection = "column";
  renderReviewList();
}

function closeReview() {
  document.getElementById("review-screen").style.display = "none";
  const ps = document.getElementById("practice-screen");
  ps.style.display = "flex";
  ps.style.flexDirection = "column";
}

function renderReviewList() {
  const list = document.getElementById("review-list");
  list.innerHTML = "";
  const entries = Object.entries(recorded).sort((a, b) => b[1] - a[1]);
  if (entries.length === 0) {
    list.innerHTML = '<div id="review-empty">No recorded words yet.</div>';
    return;
  }
  entries.forEach(([cardName, count]) => {
    const num  = cardName.slice(0, 3);
    const word = cardName.slice(4).replace(/\s+/g, " ").trim();
    const div  = document.createElement("div");
    div.className = "review-card";
    div.innerHTML =
      '<span class="card-num">' + num + '</span>' +
      '<span class="card-word">' + word + '</span>' +
      '<span class="card-count">✗ ' + count + '</span>';
    div.onclick = () => goToCard(cardName);
    list.appendChild(div);
  });
}

function goToCard(cardName) {
  const idx = CARDS.indexOf(cardName);
  if (idx === -1) return;
  queue = CARDS.slice(idx);
  queueIdx = 0;
  closeReview();
  loadCard();
}

function clearRecords() {
  if (!confirm("Clear all recorded words?")) return;
  recorded = {};
  saveRecords();
  renderReviewList();
}

// ── Keyboard shortcuts ────────────────────────────────────
document.addEventListener("keydown", (e) => {
  if (document.getElementById("practice-screen").style.display === "none") return;
  if (e.code === "Space" || e.code === "ArrowRight") {
    e.preventDefault();
    if (mode === "test" && !answered) showAnswer();
    else nextCard();
  }
  if (e.code === "ArrowLeft") { e.preventDefault(); prevCard(); }
  if (e.code === "KeyP") playSound();
  if (e.code === "KeyR") toggleRecord();
  if (e.code === "KeyV") openReview();
});

// ── Utilities ─────────────────────────────────────────────
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 2000);
}

// 從 cards.json 載入最新題庫；若失敗則沿用上方硬寫陣列
fetch("cards.json")
  .then(r => r.json())
  .then(cards => {
    CARDS = cards;
    WORDS = CARDS.map(c => c.slice(4).replace(/\s+/g, " ").trim());
    TOTAL = CARDS.length;
    document.getElementById("card-range-end").textContent = String(TOTAL).padStart(3, "0");
    document.getElementById("start-pos").max = TOTAL;
  })
  .catch(() => {});

init();
</script>
